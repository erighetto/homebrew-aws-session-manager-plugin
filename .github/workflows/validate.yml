name: Validate tap

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tap repo
        run: |
          brew tap erighetto/homebrew-aws-session-manager-plugin "$GITHUB_WORKSPACE"
          brew audit --cask --online session-manager-plugin || true
          brew style --fix Casks/session-manager-plugin.rb || true
